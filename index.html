<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzazione PDF - Landing Page</title>
    <style>
        /* Stili opzionali per centrare e dare un aspetto pulito alla sezione PDF */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pdf-container {
            width: 100%;
            max-width: 800px; /* Imposta la larghezza massima che preferisci per la landing */
            height: 600px;  /* Altezza del riquadro di visualizzazione */
            background: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
        }
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback-link {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Certificato di Analisi</h1>
    <p>Ecco i dettagli delle determinazioni quali-quantitative:</p>

    <!-- Contenitore con il PDF incorporato -->
    <div class="pdf-container">
        <embed src="whitewidow.pdf" type="application/pdf">
    </div>

    <!-- Messaggio di fallback nel caso in cui il browser del visitor non supporti i PDF -->
    <div class="fallback-link">
        <p>Il tuo browser non supporta la visualizzazione diretta dei PDF. Puoi <a href="whitewidow.pdf" target="_blank">scaricare il file PDF qui</a>.</p>
    </div>

</body>
</html>
